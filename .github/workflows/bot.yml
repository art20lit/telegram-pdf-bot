name: Telegram Excel Bot

on:
  schedule:
    - cron: '*/30 * * * *'  # Каждые 30 минут
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  run-bot:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Kill all bot processes
      run: |
        # Убиваем все процессы бота
        pkill -f "python.*bot.py" 2>/dev/null || true
        # Убиваем процессы на порту (если есть)
        fuser -k 8080/tcp 2>/dev/null || true
        sleep 3
    
    - name: Run bot once
      run: |
        # Запускаем бота и ждем 10 секунд
        python bot.py &
        sleep 10
        # Останавливаем бота после обработки
        pkill -f "python.*bot.py" 2>/dev/null || true
